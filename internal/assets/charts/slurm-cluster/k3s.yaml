# K3s-specific: GHCR images, cgroup config, and SPANK override
cudaVersion: "12.9.0"

customSlurmConfig: |
  ProctrackType=proctrack/linuxproc
  TaskPlugin=task/affinity
  PluginDir=/usr/lib/x86_64-linux-gnu/slurm
  SuspendTime=-1
  SuspendProgram=/bin/true
  ResumeProgram=/bin/true

customCgroupConfig: |
  CgroupPlugin=disabled
  ConstrainCores=no
  ConstrainDevices=no
  ConstrainRAMSpace=no
  EnableControllers=no
  IgnoreSystemd=yes

slurmConfig:
  prolog: /bin/true
  taskProlog: /bin/true
  epilog: /bin/true
  topologyPlugin: ""
  topologyParam: ""

# Make SPANK plugins optional (pyxis/nccl not available on K3s)
plugStackConfig:
  pyxis:
    required: false
  ncclDebug:
    required: false
    enabled: false

# Controller uses pre-created PVC, login SSH node port
slurmNodes:
  controller:
    volumes:
      spool:
        volumeSourceName: controller-spool
        volumeClaimTemplateSpec: null
  login:
    sshdServiceNodePort: 30222

images:
  slurmctld: "ghcr.io/nebius/soperator/controller_slurmctld:3.0.2-slurm25.11.3"
  slurmrestd: "ghcr.io/nebius/soperator/slurmrestd:3.0.2-slurm25.11.3"
  slurmd: "ghcr.io/nebius/soperator/worker_slurmd:3.0.2-slurm25.11.3"
  sshd: "ghcr.io/nebius/soperator/login_sshd:3.0.2-slurm25.11.3"
  munge: "ghcr.io/nebius/soperator/munge:3.0.2-slurm25.11.3"
  populateJailRepository: "ghcr.io/nebius/soperator/populate_jail"
  populateJailTag: "3.0.2-slurm25.11.3"
  slurmdbd: "ghcr.io/nebius/soperator/controller_slurmdbd:3.0.2-slurm25.11.3"
  soperatorExporter: "ghcr.io/nebius/soperator/soperator-exporter:3.0.2-slurm25.11.3"
  sConfigController: "ghcr.io/nebius/soperator/sconfigcontroller:3.0.2"
  mariaDB: "docker-registry1.mariadb.com/library/mariadb:12.1.2"

partitionConfiguration:
  configType: structured
  partitions:
    - name: main
      isAll: true
      config: "Default=YES MaxTime=INFINITE State=UP PriorityTier=10"
