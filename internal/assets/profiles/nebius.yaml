name: nebius
description: Nebius AI Cloud managed Kubernetes with InfiniBand GPU fabric
kubernetes:
  distribution: managed
  multiNode: true
  cgroupV2: true
  containerdSocket: /run/containerd/containerd.sock
  storageClass: csi-mounted-fs-path
  runtimeClass: nvidia
patches: {}
storage:
  type: pvc
networking:
  overlay: none
  fabric: infiniband
images:
  registry: cr.eu-north1.nebius.cloud/soperator
